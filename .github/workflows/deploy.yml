name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      # Optional NLP enrichment: set repo variable ENRICH=true to generate page
      # metadata (description/tags/categories + metrics) via taggly during the build
      - uses: actions/cache@v4
        if: vars.ENRICH == 'true'
        with:
          path: ~/.cache/huggingface
          key: taggly-models

      - name: Start taggly enrichment service
        if: vars.ENRICH == 'true'
        run: |
          git clone --depth 1 https://github.com/kotulc/taggly /tmp/taggly
          pip install /tmp/taggly
          nohup taggly start > /tmp/taggly.log 2>&1 &
          timeout 300 bash -c 'until curl -sf http://127.0.0.1:8000/status > /dev/null; do sleep 5; done'

      - name: Build
        run: |
          FLAGS=""
          if [ -n "${{ vars.CONTENT_SOURCE }}" ]; then FLAGS="--content ${{ vars.CONTENT_SOURCE }}"; fi
          if [ "${{ vars.ENRICH }}" = "true" ]; then FLAGS="$FLAGS --enrich"; fi
          node scripts/cli.js build --config mdsite.yaml $FLAGS
        env:
          BASE_PATH: ${{ vars.BASE_PATH }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # TODO: support versioning by also tagging with git tags (e.g. v1.0.0) when pushed
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mdsite:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
