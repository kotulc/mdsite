title: mdsite
description: Static documentation sites from plain markdown
repo_url: https://github.com/kotulc/mdsite
feed_url: updates
theme_toggle: navbar
toc: true

theme:
  color: default
  typeset: sans

# NLP enrichment (runs only with --enrich or on_build: true; CI gates on the ENRICH var)
enrich:
  url: http://127.0.0.1:8000
  metrics: [polarity, spam, toxicity]
  on_build: true

content: ./docs
output: ./dist

flatten:
  - updates

nav_order:
  "": [about, getting-started, configuration]
  features: [overview, components]
  specifications: [format]
  updates: [welcome]
